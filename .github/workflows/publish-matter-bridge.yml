name: Publish Matter Bridge Service Image

on:
  push:
    branches: [master]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile.matter-bridge"
      - ".github/workflows/publish-matter-bridge.yml"
      - "crates/hs-device-bridge-matter/**"
      - "crates/hs-device-contracts/**"
      - "crates/hs-eventbus-api/**"
      - "crates/hs-eventbus-mqtt-ha/**"
      - "crates/hs-eventbus-mqtt-sparkplug-b/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Normalize image owner
        id: vars
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner_lc }}/hs-device-bridge-matter
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.matter-bridge
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
