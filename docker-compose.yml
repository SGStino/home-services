services:
  mosquitto:
    image: docker.io/library/eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:0.122.1
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./infra/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro

  lgtm:
    image: docker.io/grafana/otel-lgtm:latest
    ports:
      - "3000:3000"
