receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s

exporters:
  otlphttp/lgtm:
    endpoint: http://lgtm:4318
  debug:
    verbosity: basic

service:
  telemetry:
    logs:
      level: info
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/lgtm, debug]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/lgtm, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/lgtm, debug]
